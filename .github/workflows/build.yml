name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

# Cancel in-flight runs on the same branch when a new push arrives — saves
# minutes during quick iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
          # Bundled Piper voice + sherpa-onnx AAR ride through git LFS; without
          # this they'd download as ~130 B pointer files and the build would
          # link against an empty AAR.
          submodules: false

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: |
            platforms;android-36
            build-tools;36.0.0

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      - name: assembleDebug
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: assembleRelease
        # Release-mode build exercises R8 / proguard rules. We don't have CI
        # access to a real signing key, so the release variant falls back to
        # the debug-signed signingConfig per `app/build.gradle.kts`. CI is
        # only verifying the build itself succeeds; signed-for-store APKs
        # come from a separate, secret-gated release workflow.
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 14
          if-no-files-found: error

      - name: Upload release APKs (per-ABI + universal)
        uses: actions/upload-artifact@v4
        with:
          name: release-apks
          path: app/build/outputs/apk/release/*.apk
          retention-days: 14
          if-no-files-found: error
