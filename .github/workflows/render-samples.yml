name: Render voice samples

# Rebuilds the per-voice MP3 sample library hosted on the
# `samples-rolling` release. The Voice Detail screen's "Listen sample"
# button streams whatever lives at
#   https://github.com/HayaiApp/HayaiTTS/releases/download/samples-rolling/<voice_id>.mp3
# so refreshing this release is how new voices become auditionable.
#
# Runs on GitHub-hosted `ubuntu-latest`, NOT Blacksmith — the workload is
# bandwidth-bound (a few GB of upstream model bundles), so paid runner
# minutes would be wasted. Render time on the free tier is roughly:
#   - first run, cold cache: 60–90 min (all 188 bundles downloaded)
#   - incremental runs after catalog-refresh: 5–15 min (cache hits)

on:
  workflow_dispatch:
    inputs:
      family:
        description: 'Restrict to one family (piper / kokoro / kitten / matcha / supertonic / vits / zipvoice / pocket). Empty = all.'
        required: false
        type: string
        default: ''
      limit:
        description: 'Stop after N voices (0 = unlimited). Useful for smoke testing.'
        required: false
        type: number
        default: 0
  schedule:
    # Mondays 10:00 UTC — two hours after catalog-refresh so any newly
    # added voices get their samples rendered the same day.
    - cron: '0 10 * * 1'

concurrency:
  group: render-samples
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Clone repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install OS deps (ffmpeg + espeak-ng-data)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg espeak-ng-data

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          # sherpa-onnx 1.13.2 matches the .aar vendored in app/libs/, so
          # rendering uses the same per-family config shapes the app sees.
          pip install requests sherpa-onnx==1.13.2 numpy

      - name: Restore sample + bundle cache
        uses: actions/cache@v4
        with:
          # `.sample_cache` holds downloaded tar.bz2 bundles keyed by name.
          # `samples` is the rendered MP3 output (idempotent: existing
          # files are reused if already present).
          path: |
            .sample_cache
            samples
          key: render-samples-v2-${{ hashFiles('catalog/v1/models.json') }}
          restore-keys: |
            render-samples-v2-

      - name: Render samples
        run: |
          python tools/samples/render_samples.py \
            --catalog catalog/v1/models.json \
            --output samples \
            --cache .sample_cache \
            --only-missing \
            ${{ inputs.family && format('--family {0}', inputs.family) || '' }} \
            ${{ inputs.limit && inputs.limit > 0 && format('--limit {0}', inputs.limit) || '' }}

      - name: Summarise rendered samples
        id: summary
        run: |
          # `samples/*.mp3` now includes both per-(sid,lang) combos and the
          # canonical back-compat copies, so the count reflects all clips.
          count=$(ls -1 samples/*.mp3 2>/dev/null | wc -l || echo 0)
          total=$(grep -o '"id":' catalog/v1/models.json | wc -l)
          echo "rendered=$count" >> $GITHUB_OUTPUT
          echo "total=$total" >> $GITHUB_OUTPUT
          {
            echo "Rendered: $count of $total"
            echo
            echo "Sample list (first 30):"
            ls -1 samples/ | head -30 | sed 's/^/  - /'
          } >> $GITHUB_STEP_SUMMARY || true

      - name: Upload sample MP3s to release
        if: steps.summary.outputs.rendered != '0'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: samples-rolling
          name: Voice samples (rolling)
          body: |
            Per-(speaker, language) MP3 audition clips rendered from the
            upstream sherpa-onnx model bundles using the same runtime the
            app ships. Streamed inline by HayaiTTS' Browse and Voice Detail
            audition buttons before the user downloads the model.

            **Coverage**: ${{ steps.summary.outputs.rendered }} clips across
            the ${{ steps.summary.outputs.total }} catalog voices.

            **Naming**:
              - Per-combo: `<voice_id>__sid<N>__<lang>.mp3`
              - Canonical (legacy `sampleAudioUrl`): `<voice_id>.mp3` (= sid=0
                in the voice's primary language)

            **Source phrase**: per-locale pangram or short sentence in the
            target render language (English fallback when the language has
            no PHRASES entry).

            **Encoding**: 96 kbps mono MP3 (libmp3lame). Each clip is
            typically 60–120 KB.

            **Update cadence**: weekly Monday 10:00 UTC via
            [`render-samples.yml`](https://github.com/HayaiApp/HayaiTTS/blob/main/.github/workflows/render-samples.yml),
            two hours after the upstream catalog refresh.

            This release is overwritten in place each run; do not link to
            specific commit SHAs.
          files: samples/*.mp3
          draft: false
          prerelease: true
          make_latest: false
          fail_on_unmatched_files: false

      - name: Sync catalog to bundled asset
        run: |
          mkdir -p app/src/main/assets/catalog/v1
          cp catalog/v1/models.json app/src/main/assets/catalog/v1/models.json

      - name: Commit updated catalog
        run: |
          if [ -n "$(git status --porcelain catalog/v1/models.json app/src/main/assets/catalog/v1/models.json)" ]; then
            git config user.email "actions@github.com"
            git config user.name "HayaiTTS samples bot"
            git add catalog/v1/models.json app/src/main/assets/catalog/v1/models.json
            git commit -m "samples: refresh sampleAudioUrl after render run"
            git push
          else
            echo "no catalog changes — nothing to commit"
          fi
